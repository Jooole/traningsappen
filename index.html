<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Träningsappen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/MaterialDesign-Webfont/7.4.47/css/materialdesignicons.min.css">
    <link rel="icon" type="image/png" href="images/icon-512.png">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
</head>

<body>

    <header class="app-header">
        <div class="header-left">
            <i class="mdi mdi-weight-lifter header-icon"></i>
            <h1>Träningsappen</h1>
        </div>
        <button id="edit-btn" class="btn btn-secondary">Redigera</button>
    </header>

    <div class="search-container">
        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="Sök övningar...">
            <button id="clear-search-btn" class="clear-btn" aria-label="Rensa sökning">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
    </div>

    <main class="exercise-list" id="exercise-list">
    </main>

        <a href="#" class="nav-item active">

            <span class="nav-text">Mina övningar</span>
        </a>
        <a href="#" class="nav-item">
            <i class="mdi mdi-history nav-icon-font"></i>
            <span class="nav-text">Historik</span>
        </a>
    </nav> -->

    <script type="module" src="app.js"></script>
</body>

</html>
